<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sentieri nell’Arte – Baldo Festival</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="manifest" href="/sentieri-nellarte-map/manifest.json">
    <meta name="theme-color" content="#2d5a27">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6L90M4TJHC"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6L90M4TJHC');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Pulsante geolocalizzazione (alto sinistra) */
        .locate-container {
            position: absolute;
            top: 20px;
            left: 10px;
            z-index: 1000;
        }
        .locate-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .locate-btn:hover { background: #388e3c; }

        /* Barra dei filtri (alto destra) */
        .filter-bar {
            position: absolute;
            top: 20px;
            right: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 6px 12px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            backdrop-filter: blur(4px);
            max-width: calc(100% - 140px);
        }
        .filter-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            background-color: #eee;
            color: #333;
            font-size: 13px;
        }
        .filter-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .filter-btn.active { background-color: #3388ff; color: white; box-shadow: 0 0 4px #3388ff; }
        
        /* Sposta i controlli zoom di Leaflet in basso a sinistra */
        .leaflet-control-zoom {
            position: absolute;
            bottom: 20px;
            left: 10px;
            top: auto;
            z-index: 1000;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            right: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .legend span {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        .counter {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .offline-msg {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(0,0,0,0.7);
            color: #ffaa00;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            display: none;
            white-space: nowrap;
        }

        /* Banner lavori in corso: larghezza automatica, centrato */
        .workinprogress {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #ffcc00;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            text-align: center;
            z-index: 1001;
            backdrop-filter: blur(4px);
            font-weight: bold;
            pointer-events: none;
            white-space: nowrap;
            width: auto;
        }

        /* Crediti Mappa Bianca (basso centro) */
        .mappa-bianca-credit {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            pointer-events: auto;
            color: #ddd;
        }
        .mappa-bianca-credit a {
            color: #ffaa66;
            text-decoration: none;
            font-weight: bold;
        }
        .mappa-bianca-credit a:hover {
            text-decoration: underline;
            color: #ffcc88;
        }
        
        /* ================================= */
        /* REGOLE PER SMARTPHONE (max-width: 600px) */
        /* ================================= */
        @media (max-width: 600px) {
            .filter-bar {
                top: 10px;
                right: 10px;
                padding: 4px 8px;
                gap: 4px;
                max-width: calc(100% - 130px);
            }
            .filter-btn { padding: 4px 10px; font-size: 11px; }
            
            .locate-container {
                top: 10px;
                left: 10px;
            }
            .locate-btn { padding: 4px 8px; font-size: 12px; }
            
            /* I controlli zoom di Leaflet li nascondiamo su mobile (opzionale) */
            .leaflet-control-zoom {
                display: none !important;
            }
            
            /* Nascondi il contatore */
            .counter {
                display: none;
            }
            
            /* Legenda più in alto per evitare sovrapposizioni */
            .legend {
                font-size: 10px;
                bottom: 100px;
            }
            
            .offline-msg { top: 80px; font-size: 10px; white-space: nowrap; }
            .workinprogress {
                bottom: 60px;
                font-size: 10px;
                padding: 5px 12px;
                white-space: nowrap;
            }
            .mappa-bianca-credit {
                font-size: 9px;
                padding: 3px 10px;
                bottom: 30px;
                white-space: nowrap;
            }
        }

        @media (max-width: 370px) {
    .filter-bar {
        max-width: calc(100% - 80px);  /* riduci la larghezza massima */
        padding: 4px 6px;
        gap: 3px;
    }
    .filter-btn {
        padding: 3px 8px;
        font-size: 10px;
    }
    .locate-container {
        left: 5px;
        top: 8px;
    }
    .locate-btn {
        padding: 3px 6px;
        font-size: 11px;
    }
    .workinprogress {
        font-size: 9px;
        padding: 4px 10px;
        bottom: 55px;
        white-space: nowrap;
    }
}
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="workinprogress">
        🔧 Lavori in corso – Questa è un'anteprima. Contenuti in arrivo.
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="locate-container">
        <button id="locateBtn" class="locate-btn">📍 La mia posizione</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="counter" id="counter">Caricamento...</div>
    <div class="offline-msg" id="offlineMsg">⚠️ Modalità offline – alcune aree potrebbero non essere visibili</div>
    <div class="mappa-bianca-credit">
        Powered by <strong>Mappa Bianca</strong> | <a href="https://vival18.github.io/mappa-bianca/" target="_blank" rel="noopener noreferrer">Scopri di più</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        // ========================
        // 1. VARIABILI GLOBALI
        // ========================
        let map;
        let markerClusterGroup;
        let allMarkers = [];
        let currentFilter = 'Tutti';

        const colorMap = {
            'opera': '#e31a23',
            'servizio': '#1e90ff',
            'storico': '#ff8c00'
        };

        const categoryNames = {
            'opera': 'Opere',
            'servizio': 'Servizi',
            'storico': 'Punti storici'
        };

        // ========================
        // 2. FUNZIONI DI MAPPA E MARKER
        // ========================
        function getColoredIcon(color) {
            return L.divIcon({
                html: `<div style="background-color: ${color}; width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.5);"></div>`,
                iconSize: [28, 28],
                className: 'custom-marker',
                popupAnchor: [0, -14]
            });
        }

        function initMap() {
            map = L.map('map');
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

                map.on('click', function(e) {
        console.log(`📍 [${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}]`);
            });
            
            markerClusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                maxClusterRadius: 80,
                disableClusteringAtZoom: 18
            });
            map.addLayer(markerClusterGroup);
        }

        function addSentieroFromGeoJSON() {
            fetch('./mappaturasentieroarte.geojson')
                .then(response => {
                    if (!response.ok) throw new Error('GeoJSON non trovato');
                    return response.json();
                })
                .then(geojsonData => {
                    const sentieroLayer = L.geoJSON(geojsonData, {
                        style: { color: 'red', weight: 4, dashArray: '8, 8', fill: false },
                        onEachFeature: (feature, layer) => {
                            if (feature.properties?.name) layer.bindPopup(feature.properties.name);
                            else if (feature.properties?.description) layer.bindPopup(feature.properties.description);
                        }
                    }).addTo(map);
                    map.fitBounds(sentieroLayer.getBounds());
                })
                .catch(error => {
                    console.error(error);
                    alert('Sentiero GeoJSON non trovato. Verifica che "mappaturasentieroarte.geojson" sia nella cartella.');
                    const defaultSentiero = L.polyline([
                        [45.618771, 10.824897],
                        [45.618800, 10.825000]
                    ], { color: 'red', weight: 4 }).addTo(map);
                    map.fitBounds(defaultSentiero.getBounds());
                });
        }

        function updateCounter() {
            const visible = markerClusterGroup.getLayers().length;
            document.getElementById('counter').innerHTML = `📍 ${visible} / ${allMarkers.length} punti`;
        }

        function filterMarkers(category) {
            currentFilter = category;
            markerClusterGroup.clearLayers();
            allMarkers.forEach(item => {
                let match = false;
                if (category === 'Tutti') match = true;
                else if (category === 'Opere' && item.tipologia === 'opera') match = true;
                else if (category === 'Servizi' && item.tipologia === 'servizio') match = true;
                else if (category === 'Punti Storici' && item.tipologia === 'storico') match = true;
                if (match) markerClusterGroup.addLayer(item.marker);
            });
            updateCounter();
        }

        function buildFilters() {
            const filterDiv = document.getElementById('filterBar');
            filterDiv.innerHTML = '';
            const buttons = ['Tutti', 'Opere', 'Servizi', 'Punti Storici'];
            buttons.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.classList.add('filter-btn');
                if (cat === 'Tutti') btn.classList.add('active');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterMarkers(cat);
                });
                filterDiv.appendChild(btn);
            });
        }

        function buildLegend(uniqueTypes) {
            const legendDiv = document.getElementById('legend');
            legendDiv.innerHTML = '<strong>Legenda</strong><br>';
            if (uniqueTypes.length === 0) {
                legendDiv.innerHTML += '<span style="background-color:red;"></span> Sentiero<br>';
                return;
            }
            const order = ['opera', 'servizio', 'storico'];
            order.forEach(cat => {
                if (uniqueTypes.includes(cat)) {
                    legendDiv.innerHTML += `<span style="background-color: ${colorMap[cat]};"></span> ${categoryNames[cat]}<br>`;
                }
            });
            legendDiv.innerHTML += '<span style="background-color:red; border-radius: 4px; width:16px; height:4px;"></span> Sentiero<br>';
        }

        // ========================
        // 3. GEOLOCALIZZAZIONE
        // ========================
        const locateBtn = document.getElementById('locateBtn');
        let userMarker = null, userCircle = null;

        function onLocationFound(e) {
            const { latitude: lat, longitude: lng, accuracy: radius } = e;
            map.setView([lat, lng], 16);
            if (userMarker) map.removeLayer(userMarker);
            if (userCircle) map.removeLayer(userCircle);
            const userIcon = L.divIcon({
                html: `<div style="background-color: #2196f3; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px black;"></div>`,
                iconSize: [20, 20],
                className: 'user-marker'
            });
            userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map).bindPopup('Sei qui').openPopup();
            userCircle = L.circle([lat, lng], { radius, color: '#2196f3', weight: 1, fillOpacity: 0.1 }).addTo(map);
        }

        function onLocationError(e) {
            let message = '';
            switch (e.code) {
                case 1: message = 'Permesso negato. Attiva la geolocalizzazione.'; break;
                case 2: message = 'Posizione non disponibile.'; break;
                case 3: message = 'Timeout della richiesta.'; break;
                default: message = 'Errore sconosciuto.';
            }
            alert('⚠️ ' + message);
        }

        locateBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Il tuo browser non supporta la geolocalizzazione.');
                return;
            }
            locateBtn.textContent = '📍 Ricerca...';
            locateBtn.disabled = true;
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    locateBtn.textContent = '📍 La mia posizione';
                    locateBtn.disabled = false;
                    onLocationFound({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    });
                },
                (error) => {
                    locateBtn.textContent = '📍 La mia posizione';
                    locateBtn.disabled = false;
                    onLocationError(error);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // ========================
        // 4. OFFLINE DETECTION
        // ========================
        function checkOffline() {
            const offlineMsg = document.getElementById('offlineMsg');
            offlineMsg.style.display = navigator.onLine ? 'none' : 'block';
        }
        window.addEventListener('online', checkOffline);
        window.addEventListener('offline', checkOffline);

        // ========================
        // 5. CARICAMENTO MARKER E AVVIO
        // ========================
        initMap();
        addSentieroFromGeoJSON();
        checkOffline();

        fetch('markers.json')
            .then(response => response.json())
            .then(data => {
                if (!data.length) throw new Error('Nessun marker');
                const typesSet = new Set();
                data.forEach(m => {
                    let tipologia = m.tipologia;
                    if (tipologia === 'opera' || tipologia === 'opere') tipologia = 'opera';
                    else if (tipologia === 'servizio' || tipologia === 'servizi') tipologia = 'servizio';
                    else if (tipologia === 'storico' || tipologia === 'Punti storici') tipologia = 'storico';
                    else tipologia = 'opera';
                    m.tipologiaNorm = tipologia;
                    typesSet.add(tipologia);
                });
                const uniqueTypes = Array.from(typesSet);

                data.forEach(m => {
                    const lat = parseFloat(m.lat);
                    const lng = parseFloat(m.lng);
                    if (isNaN(lat) || isNaN(lng)) return;
                    const tipologia = m.tipologiaNorm;
                    const color = colorMap[tipologia] || '#cccccc';
                    const icon = getColoredIcon(color);
                    const popupContent = `
                        <strong>${escapeHtml(m.title)}</strong><br>
                        <em>Tipologia:</em> ${categoryNames[tipologia] || tipologia}<br>
                        ${m.thumbnail ? `<img src="${escapeHtml(m.thumbnail)}" style="width:100px; max-width:100%; margin-top:5px; border-radius:4px;"><br>` : ''}
                        <p>${escapeHtml(m.excerpt || (m.content ? m.content.substring(0,150) : ''))}...</p>
                    `;
                    const marker = L.marker([lat, lng], { icon }).bindPopup(popupContent);
                    allMarkers.push({ marker, tipologia });
                });

                buildFilters();
                buildLegend(uniqueTypes);
                filterMarkers('Tutti');
            })
            .catch(err => {
                console.warn(err);
                document.getElementById('counter').innerHTML = 'ℹ️ Nessun punto d’interesse (solo sentiero)';
                document.getElementById('legend').innerHTML = '<strong>Legenda</strong><br><span style="background-color:red;"></span> Sentiero';
                buildFilters();
            });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sentieri-nellarte-map/sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installBtn');
            if (installBtn) {
                installBtn.style.display = 'block';
                installBtn.addEventListener('click', () => {
                    installBtn.style.display = 'none';
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') console.log('Utente ha accettato');
                        deferredPrompt = null;
                    });
                });
            }
        });
</script>
</body>
</html>
